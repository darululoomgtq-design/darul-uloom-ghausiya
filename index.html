<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1580582932707-520aed937b7b") no-repeat center/cover;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.7);
    color:white;
}

/* LOGO SECTION */
.logo-section{
    display:flex;
    align-items:center;
}

.logo-section img{
     width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-right: 12px;
    object-fit: cover;
}

.school-name{
    font-size:22px;
    font-weight:bold;
}

/* LOGIN */
.login{
    position:relative;
}

.login button{
    padding:10px 20px;
    background:#00bcd4;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
    font-size:15px;
}

.dropdown{
    display:none;
    position:absolute;
    right:0;
    background:white;
    min-width:160px;
    border-radius:5px;
    overflow:hidden;
}

.dropdown a{
    display:block;
    padding:10px;
    text-decoration:none;
    color:black;
}

.dropdown a:hover{
    background:#eee;
}

.login:hover .dropdown{
    display:block;
}

/* CENTER TEXT */
.center{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    background:rgba(0,0,0,0.4);
}

.center h1{
    font-size:42px;
}
</style>
</head>

<body>

<header>
    <div class="logo-section">
        <!-- ✅ YOUR LOGO HERE -->
        <img src="logo(1).png" alt="School Logo">

        <div class="school-name">
            Darul Uloom Ghausiya Tajveedul Quran
        </div>
    </div>

    <div class="login">
        <button>Login</button>

        <div class="dropdown">
            <a href="student.html">Student</a>
            <a href="teacher.html">Teacher</a>
            <a href="admin.html">Admin</a>
        </div>
    </div>
</header>

<div class="center">
    <h1>Welcome to Our School</h1>
</div>

</body>
</html>

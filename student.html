<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
</head>
<body>

<h2>Student Login</h2>

<input type="text" id="id" placeholder="Student ID"><br><br>
<input type="password" id="pass" placeholder="Password"><br><br>

<button id="loginBtn">Login</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lfcfkmhstqyldzttfpqk.supabase.co",
  "sb_publishable_dJMJ0SpmOXFprT6O9U5w2w_8eCxobTN"
);

document.getElementById("loginBtn").addEventListener("click", async () => {

    let id = document.getElementById("id").value;
    let password = document.getElementById("pass").value;

    const { data, error } = await supabase
        .from("students")
        .select("*")
        .eq("student_id", id)
        .eq("password", password);

    console.log(data, error); // 🔥 debug

    if(error){
        alert("Error: " + error.message);
        return;
    }

    if(data && data.length > 0){
        alert("Login Successful ✅");
    } else {
        alert("Invalid ID or Password ❌");
    }
});
</script>

</body>
</html>

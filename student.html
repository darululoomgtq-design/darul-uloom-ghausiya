<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
</head>
<body>

<h1>Student Dashboard</h1>

<h3>Attendance</h3>
<div id="attendance">Loading...</div>

<h3>Announcements</h3>
<div id="announcements">Loading...</div>

<h3>Tests</h3>
<div id="tests">Loading...</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// ✅ Your Supabase credentials (already provided)
const supabase = createClient(
  "https://lfcfkmhstqyldzttfpqk.supabase.co",
  "sb_publishable_dJMJ0SpmOXFprT6O9U5w2w_8eCxobTN"
);

async function loadDashboard() {

  // 🔴 Get student id from login page
  const studentId = localStorage.getItem("student_id");

  if (!studentId) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  // 🔵 Attendance
  const { data: attendance } = await supabase
    .from("attendance")
    .select("*")
    .eq("student_id", studentId);

  document.getElementById("attendance").innerHTML =
    attendance && attendance.length
      ? attendance.map(a => `<p>${a.status}</p>`).join("")
      : "No attendance data";

  // 🔵 Announcements
  const { data: announcements } = await supabase
    .from("announcements")
    .select("*");

  document.getElementById("announcements").innerHTML =
    announcements && announcements.length
      ? announcements.map(a => `<p>📢 ${a.message}</p>`).join("")
      : "No announcements";

  // 🔵 Tests
  const { data: tests } = await supabase
    .from("tests")
    .select("*");

  document.getElementById("tests").innerHTML =
    tests && tests.length
      ? tests.map(t => `<p>📝 ${t.title} - ${t.date}</p>`).join("")
      : "No tests available";
}

loadDashboard();
</script>

</body>
</html>
